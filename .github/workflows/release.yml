name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Package .app (ad-hoc signed)
        run: ./scripts/make-app.sh release

      - name: Zip app bundle
        run: ditto -c -k --keepParent BunnyUploader.app BunnyUploader.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" BunnyUploader.zip --clobber
          else
            gh release create "$TAG" BunnyUploader.zip --title "$TAG" --generate-notes
          fi
