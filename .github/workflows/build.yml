name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Package .app (ad-hoc signed)
        run: ./scripts/make-app.sh release

      - name: Zip app bundle
        run: ditto -c -k --keepParent BunnyUploader.app BunnyUploader.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: BunnyUploader-app
          path: BunnyUploader.zip
          if-no-files-found: error
